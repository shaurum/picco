site_name:  СА ПЛК
site_url: https://manual.saplc.ru/

theme:
  name: material
  custom_dir: overrides
  font:
    text: Montserrat
  features:
    - glightbox
    - navigation.instant
    - navigation.tabs
    - content.code.annotate
    - search.suggest
    - search.highlight
    - content.code.copy
  
  logo: img/logo_old.svg
  favicon: img/favicon.svg
  icon:
    annotation: material/chevron-right-circle
 
  language: ru
  palette:
    # Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: Red
      accent: grey

    # Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: Red
      accent: grey 
      
extra_css:
  - stylesheets/extra.css
extra:
  generator: false


extra_javascript:
  - overrides/main.js
  - path: https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js
    type: module
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Руководство пользователя:
    - Главная: index.md
    - Общие сведения: general.md
    - Подготовка к работе:
      - Монтаж и демонтаж: installation.md
      - Правила сборки: assembly_rules.md
      - Составление сборок: assembly.md
      - Организация питания: power_organization.md
      - Настройка: 
        - Подготовка к настройке: setup_preparation.md
        - Управление доступом к контроллеру: access_control.md
        - Востановление заводских настроек: factory_reset.md
        - Доступ к операционной системе контроллера: os_access.md
        - Работа прибора с CODESYS V3.5: codesys_integration.md
    - Модули:
      - Основные модули:
        - Модуль основной SA-P5-GMB: modules/GMB.md
        - Модуль основной SA-P5-GMR: modules/GMR.md
      - Дискретные модули:
        - Модуль дискретного ввода SA-P5-DI: modules/DI.md
        - Модуль дискретного вывода SA-P5-DO: modules/DO.md
        - Модуль дискретного вывода ШИМ SA-P5-DPWM: modules/DPWM.md
      - Аналоговые модули:
        - Модуль аналогового ввода тока SA-P5-AIC: modules/AIC.md
        - Модуль аналогового ввода напряжения SA-P5-AIV: modules/AIV.md
        - Модуль аналогового ввода термопары SA-P5-AITC: modules/AITC.md
        - Модуль аналогового ввода термосопротивления SA-P5-AITR: modules/AITR.md
        - Модуль аналогового ввода синусно-косинусного трансформатора SA-P5-AISCT: modules/AISCT.md
        - Модуль аналогового ввода виброскорости SA-P5-AIVS: modules/AIVS.md
        - Модуль аналогового вывода SA-P5-AO: modules/AO.md
      - Интерфейсные модули:
        - Модуль интерфейсный RS-485/422 SA-P5-IF485/422: modules/IF485_422.md
        - Модуль интерфейсный IF232 SA-P5-IF232: modules/IF232.md
        - Модуль интерфейсный IFCAN SA-P5-IFCAN: modules/IFCAN.md
        - Модуль интерфейсный IFHART SA-P5-IFHART: modules/IFHART.md
        - Модуль интерфейсный IFARINC SA-P5-IFARINC: modules/IFARINC.md
      - Специальные модули:
        - Модуль ввода питания SA-P5-SPPM: modules/SPPM.md
        - Модуль оконечный SA-P5-SPTM: modules/SPTM.md
        - Модуль счета импульсов SA-P5-SPPC: modules/SPPC.md
        - Модуль подключения инкрементальных энкодеров SA-P5-SPIE: modules/SPIE.md
        - Модуль измерения частоты SA-P5-SPFM: modules/SPFM.md
        - Модуль управления драйвером шагового двигателя SA-P5-SPSMD: modules/SPSMD.md
        - Модуль расширения коммутации SA-P5-SPSE: modules/SPSE.md
  - Статьи: blog/index.md
  - Форум: https://t.me/+jT-lYOb1kB04MmQ6

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - footnotes
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - abbr
  - pymdownx.arithmatex:
     generic: true

plugins:
 - search
 - blog:
     authors_file: .authors.yml
 - tags:
      tags_file: tags.md
 


 